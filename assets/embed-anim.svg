<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 210" width="100%" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" role="img" aria-label="equivalent quantum circuits map to nearby vectors, unrelated ones stay far">
  <text x="20" y="22" font-size="13" fill="#768390">equivalent circuits &#8594; nearby vectors &#183; unrelated &#8594; far</text>

  <!-- embedding plane -->
  <rect x="20" y="34" width="600" height="158" rx="12" fill="none" stroke="#30363d"/>
  <text x="606" y="184" font-size="11" fill="#484f58" text-anchor="end">128-d embedding space (projected)</text>

  <!-- anchor a -->
  <circle cx="300" cy="118" r="7" fill="#58a6ff"/>
  <text x="300" y="142" font-size="12" fill="#768390" text-anchor="middle">a</text>

  <!-- rewrite of a: H,H,H vs H is the same unitary; drifts in to sit beside a -->
  <line x1="300" y1="118" x2="560" y2="64" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3 3" opacity="0.5">
    <animate attributeName="x2" values="560;318;318;560" keyTimes="0;0.4;0.78;1" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="64;112;112;64" keyTimes="0;0.4;0.78;1" dur="6s" repeatCount="indefinite"/>
  </line>
  <circle cy="64" r="7" fill="#58a6ff" opacity="0.85">
    <animate attributeName="cx" values="560;318;318;560" keyTimes="0;0.4;0.78;1" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="64;112;112;64" keyTimes="0;0.4;0.78;1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <text font-size="12" fill="#768390" text-anchor="middle">
    <animate attributeName="x" values="560;318;318;560" keyTimes="0;0.4;0.78;1" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y" values="48;96;96;48" keyTimes="0;0.4;0.78;1" dur="6s" repeatCount="indefinite"/>
    a after rewrites
  </text>

  <!-- cosine readout that brightens as they converge -->
  <text x="372" y="124" font-size="12" fill="#3fb950" opacity="0.15">cos &#8776; 0.96
    <animate attributeName="opacity" values="0.15;1;1;0.15" keyTimes="0;0.4;0.78;1" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- unrelated b, stays far with a small idle drift -->
  <circle cx="110" cy="150" r="7" fill="#f0883e">
    <animate attributeName="cy" values="150;144;150" dur="5s" repeatCount="indefinite"/>
  </circle>
  <text x="110" y="174" font-size="12" fill="#768390" text-anchor="middle">b &#183; unrelated</text>
  <text x="150" y="150" font-size="12" fill="#768390">cos &#8776; 0.02</text>
</svg>
