<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="quark - vector embeddings for quantum circuits">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#141d36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36d6e7"/>
      <stop offset="0.55" stop-color="#7b8cff"/>
      <stop offset="1" stop-color="#c46bff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- faint reference grid -->
  <g stroke="#22304f" stroke-width="1" opacity="0.35">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="170" font-family="ui-sans-serif, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="120" font-weight="800" fill="url(#accent)" filter="url(#glow)">quark</text>
  <text x="86" y="220" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="26" fill="#9fb0d0">vector embeddings for quantum circuits</text>
  <text x="86" y="256" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="18" fill="#5f7398">equivalent circuits land close &#183; unrelated ones land far apart</text>

  <!-- circuit motif on the right -->
  <g transform="translate(760,70)" stroke="#3a4a72" stroke-width="3" fill="none">
    <line x1="0" y1="40" x2="360" y2="40"/>
    <line x1="0" y1="110" x2="360" y2="110"/>
    <line x1="0" y1="180" x2="360" y2="180"/>
  </g>
  <g transform="translate(760,70)" font-family="ui-monospace, Menlo, monospace" font-size="22" fill="#0a0e1a">
    <!-- H gate -->
    <rect x="40" y="18" width="44" height="44" rx="7" fill="#36d6e7"/>
    <text x="52" y="48">H</text>
    <!-- Rz gate -->
    <rect x="150" y="158" width="56" height="44" rx="7" fill="#c46bff"/>
    <text x="158" y="188" font-size="18">Rz</text>
    <!-- CNOT: control on wire 0, target on wire 1 -->
    <circle cx="250" cy="40" r="9" fill="#7b8cff"/>
    <line x1="250" y1="40" x2="250" y2="110" stroke="#7b8cff" stroke-width="3"/>
    <circle cx="250" cy="110" r="18" fill="none" stroke="#7b8cff" stroke-width="3"/>
    <line x1="232" y1="110" x2="268" y2="110" stroke="#7b8cff" stroke-width="3"/>
    <line x1="250" y1="92" x2="250" y2="128" stroke="#7b8cff" stroke-width="3"/>
  </g>

  <!-- pulsing embedding points (the "vector" the circuit maps to) -->
  <g transform="translate(760,70)" fill="#36d6e7">
    <circle cx="330" cy="40" r="6">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="330" cy="110" r="6" fill="#7b8cff">
      <animate attributeName="opacity" values="1;0.25;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="330" cy="180" r="6" fill="#c46bff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
